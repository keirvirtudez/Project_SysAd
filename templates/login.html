{% extends "base.html" %}

{% block title %}Login - Group 5 Cloud Security{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 100px auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">🔐 Secure Login</h2>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <span class="security-badge badge-encrypted">🔒 TLS 1.3</span>
        <span class="security-badge badge-mfa">🔐 MFA Protected</span>
        <span class="security-badge badge-encrypted">🛡️ WAF Active</span>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required 
                   placeholder="Enter username" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required 
                   placeholder="Enter password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Login
        </button>
    </form>
    
    <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #666;">
        <p>Protected by Multi-AZ Architecture | AES-256 Encryption</p>
        <p>Unauthorized access is monitored and logged</p>
    </div>
</div>
{% endblock %}
